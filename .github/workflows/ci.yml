# .github/workflows/ci.yml

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define a matrix to run linters for each part of the monorepo
        project: [frontend, backend-gateway, backend-compute]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js (for frontend and gateway)
        if: matrix.project == 'frontend' || matrix.project == 'backend-gateway'
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: ./${{ matrix.project }}/package-lock.json

      - name: Install Node.js Dependencies
        if: matrix.project == 'frontend' || matrix.project == 'backend-gateway'
        run: npm ci
        working-directory: ./${{ matrix.project }}

      - name: Run ESLint
        if: matrix.project == 'frontend' || matrix.project == 'backend-gateway'
        run: npm run lint
        working-directory: ./${{ matrix.project }}

      - name: Set up Python (for compute service)
        if: matrix.project == 'backend-compute'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ./${{ matrix.project }}/requirements.txt

      - name: Install Python Dependencies
        if: matrix.project == 'backend-compute'
        run: pip install -r requirements.txt
        working-directory: ./${{ matrix.project }}

      - name: Run Black Linter
        if: matrix.project == 'backend-compute'
        run: black --check .
        working-directory: ./${{ matrix.project }}

  validate-docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    # This job should run after all linting jobs have passed
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services
        run: docker-compose build
        # This command uses the docker-compose.yml file to build all images,
        # ensuring the Dockerfiles are correct and all dependencies are met.

      - name: Verify built images
        run: docker images
