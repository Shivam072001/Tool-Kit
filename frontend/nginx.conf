# frontend/nginx.conf

server {
  listen 80;
  server_name localhost;

  # Root directory for static files.
  root /usr/share/nginx/html;
  index index.html;

  # Compression to improve performance.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  location / {
    # First, try to serve the request as a file.
    # If not found, try it as a directory.
    # If still not found, fall back to serving index.html. This is the key for SPA routing.
    try_files $uri $uri/ /index.html;
  }

  # Add long-lived cache headers for static assets.
  location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|css|js)$ {
    expires 1M;
    access_log off;
    add_header Cache-Control "public";
  }
}